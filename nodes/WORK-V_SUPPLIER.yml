    sourceMapping:
      - aliases:
          DIM_SUPPLIER: 6454c265-33c1-473b-a903-91d06598c748
        customSQL:
          customSQL: |+
            {{ stage('Override Create SQL') }} CREATE OR REPLACE VIEW {{this}} AS WITH FilteredSuppliers AS ( 
                SELECT * FROM 
                {{ ref('PANDE.WORKDEV', 'DIM_SUPPLIER') }} 
                WHERE "S_ACCTBAL" > 0 -- Filter suppliers with positive account balance ), EnhancedSuppliers AS ( 
                SELECT "DIM_SUPPLIER_KEY", 
                "S_SUPPKEY", 
                "S_NAME", 
                "S_ADDRESS", 
                "S_NATIONKEY", 
                "S_PHONE", 
                "S_ACCTBAL", 
                "S_COMMENT", 
                "SYSTEM_VERSION", 
                "SYSTEM_CURRENT_FLAG", 
                "SYSTEM_START_DATE", 
                "SYSTEM_END_DATE", 
                "SYSTEM_CREATE_DATE", 
                "SYSTEM_UPDATE_DATE", 
            CASE 
            WHEN "S_ACCTBAL" > 10000 THEN 'HIGH_BALANCE' 
            WHEN "S_ACCTBAL" BETWEEN 5000 AND 10000 THEN 'MEDIUM_BALANCE' 
            ELSE 'LOW_BALANCE'
            END AS "BALANCE_CATEGORY" -- Classify suppliers by account balance FROM FilteredSuppliers ) SELECT * FROM EnhancedSuppliers

        dependencies:
          - locationName: WORK
            nodeName: DIM_SUPPLIER
        join:
          joinCondition: FROM {{ ref('WORK', 'DIM_SUPPLIER') }} "DIM_SUPPLIER"
        name: V_SUPPLIER
        noLinkRefs: []
